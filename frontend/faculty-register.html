<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Registration - Smart Classroom</title>
    <style>
        :root {
            --primary-color: #ffffff;
            --secondary-color: #f8f9fa;
            --accent-color: #ff7473;
            --accent-secondary: #20b1ab;
            --text-primary: #2c3e50;
            --text-secondary: #64748b;
            --card-bg: #ffffff;
            --card-bg-hover: #f8f9fa;
            --border-color: #e1e4e8;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --error-color: #dc3545;
            --hover-bg: #f8f9fa;
            --modal-bg: #ffffff;
            --input-bg: #ffffff;
            --dropdown-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent-color);
            opacity: 0.05;
        }

        .register-container {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid #e1e4e8;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .register-subtitle {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-input:focus {
            outline: none;
            border-color: #20b1ab;
            box-shadow: 0 0 0 3px rgba(32, 177, 171, 0.15);
        }

        .form-input.error {
            border-color: #e74c3c;
        }

        .error-text {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-text.show {
            display: block;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff7473 0%, #20b1ab 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 116, 115, 0.35);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .auth-switch-text {
            color: #666;
            font-size: 14px;
        }

        .auth-switch-link {
            color: #ff7473;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-switch-link:hover {
            color: #20b1ab;
            text-decoration: underline;
        }

        .auth-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .auth-message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .auth-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .auth-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .register-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="register-header">
            <h1 class="register-title">Faculty Registration</h1>
            <p class="register-subtitle">Create your faculty account</p>
        </div>

        <div id="registerError" class="auth-message error"></div>
        <div id="registerSuccess" class="auth-message success"></div>

        <form id="facultyRegisterForm" class="register-form">
            <div class="form-group">
                <label class="form-label" for="facultyId">Faculty ID</label>
                <input type="text" id="facultyId" name="faculty_id" class="form-input" placeholder="e.g., FAC001"
                    required>
                <div id="facultyIdError" class="error-text">Faculty ID is required</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-input" placeholder="Dr. John Doe" required>
                <div id="nameError" class="error-text">Name is required</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="faculty@christuniversity.in"
                    required>
                <div id="emailError" class="error-text">Please enter a valid Christ University email address</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input"
                    placeholder="Create a strong password" required>
                <div id="passwordError" class="error-text">Password must be at least 6 characters</div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="department">Department</label>
                    <input type="text" id="department" name="department" class="form-input"
                        placeholder="Computer Science" required>
                    <div id="departmentError" class="error-text">Department is required</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="designation">Designation</label>
                    <input type="text" id="designation" name="designation" class="form-input" placeholder="Professor"
                        required>
                    <div id="designationError" class="error-text">Designation is required</div>
                </div>
            </div>

            <button type="submit" class="btn-register">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M8.5 7a4 4 0 100-8 4 4 0 000 8z" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M20 8v6M23 11h-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Create Faculty Account
            </button>
        </form>

        <div class="auth-switch">
            <p class="auth-switch-text">
                Already have an account?
                <a class="auth-switch-link" href="faculty-login.html">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        // Email validation for Christ University
        function validateChristUniversityEmail(email) {
            const christEmailRegex = /^[a-zA-Z0-9._%+-]+@(?:[a-zA-Z0-9-]+\.)?christuniversity\.in$/;
            return christEmailRegex.test(email);
        }

        // Show/hide error messages
        function showError(fieldId, show = true, message = '') {
            const field = document.getElementById(fieldId);
            const errorText = document.getElementById(fieldId + 'Error');

            if (!field || !errorText) {
                console.warn(`Field or error element not found: ${fieldId}`);
                return;
            }

            if (show) {
                field.classList.add('error');
                errorText.classList.add('show');
                if (message) {
                    errorText.textContent = message;
                }
            } else {
                field.classList.remove('error');
                errorText.classList.remove('show');
            }
        }

        function showRegisterError(message) {
            const errorDiv = document.getElementById('registerError');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showRegisterSuccess(message) {
            const successDiv = document.getElementById('registerSuccess');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            setTimeout(() => successDiv.classList.remove('show'), 5000);
        }

        // Real-time email validation
        document.getElementById('email').addEventListener('blur', function () {
            const email = this.value.trim();
            if (email && !validateChristUniversityEmail(email)) {
                showError('email', true);
            } else {
                showError('email', false);
            }
        });

        // Form submission
        document.getElementById('facultyRegisterForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const facultyData = {
                faculty_id: formData.get('faculty_id').trim(),
                name: formData.get('name').trim(),
                email: formData.get('email').trim(),
                password: formData.get('password'),
                department: formData.get('department').trim(),
                designation: formData.get('designation').trim()
            };

            // Reset all errors
            ['facultyId', 'name', 'email', 'password', 'department', 'designation'].forEach(id => {
                showError(id, false);
            });

            let hasErrors = false;

            // Validate Faculty ID
            if (!facultyData.faculty_id) {
                showError('facultyId', true, 'Faculty ID is required');
                hasErrors = true;
            }

            // Validate Name
            if (!facultyData.name) {
                showError('name', true, 'Name is required');
                hasErrors = true;
            }

            // Validate Email
            if (!facultyData.email) {
                showError('email', true, 'Email is required');
                hasErrors = true;
            } else if (!validateChristUniversityEmail(facultyData.email)) {
                showError('email', true, 'Must be a Christ University email');
                hasErrors = true;
            }

            // Validate Password
            if (!facultyData.password) {
                showError('password', true, 'Password is required');
                hasErrors = true;
            } else if (facultyData.password.length < 6) {
                showError('password', true, 'Password must be at least 6 characters');
                hasErrors = true;
            }

            // Validate Department
            if (!facultyData.department) {
                showError('department', true, 'Department is required');
                hasErrors = true;
            }

            // Validate Designation
            if (!facultyData.designation) {
                showError('designation', true, 'Designation is required');
                hasErrors = true;
            }

            if (hasErrors) {
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/faculty/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(facultyData)
                });

                const data = await response.json();

                if (response.ok) {
                    // Store the token returned by registration for auto-login
                    localStorage.setItem('faculty_token', data.access_token);
                    localStorage.setItem('faculty_user', JSON.stringify({
                        email: facultyData.email,
                        token: data.access_token
                    }));

                    showRegisterSuccess('Account created! Redirecting to your portal...');

                    setTimeout(() => {
                        window.location.href = 'faculty-dashboard.html';
                    }, 1500);
                } else {
                    showRegisterError(data.detail || 'Registration failed');
                }
            } catch (error) {
                showRegisterError('Network error. Please try again.');
            }
        });

        // Clear errors on input
        ['facultyId', 'name', 'department', 'designation'].forEach(id => {
            document.getElementById(id).addEventListener('input', function () {
                showError(id, false);
            });
        });
    </script>
</body>

</html>
