<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login - Smart Classroom</title>
    <style>
        :root {
            --primary-color: #ffffff;
            --secondary-color: #f8f9fa;
            --accent-color: #ff7473;
            --accent-secondary: #20b1ab;
            --text-primary: #2c3e50;
            --text-secondary: #64748b;
            --card-bg: #ffffff;
            --card-bg-hover: #f8f9fa;
            --border-color: #e1e4e8;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --error-color: #dc3545;
            --hover-bg: #f8f9fa;
            --modal-bg: #ffffff;
            --input-bg: #ffffff;
            --dropdown-bg: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--accent-color);
            opacity: 0.05;
        }

        .login-container {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid #e1e4e8;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-input:focus {
            outline: none;
            border-color: #20b1ab;
            box-shadow: 0 0 0 3px rgba(32, 177, 171, 0.15);
        }

        .form-input.error {
            border-color: #e74c3c;
        }

        .error-text {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-text.show {
            display: block;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff7473 0%, #20b1ab 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 116, 115, 0.35);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .auth-switch-text {
            color: #666;
            font-size: 14px;
        }

        .auth-switch-link {
            color: #ff7473;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-switch-link:hover {
            color: #20b1ab;
            text-decoration: underline;
        }

        .auth-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .auth-message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .auth-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .auth-message.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">Faculty Login</h1>
            <p class="login-subtitle">Sign in to access your faculty portal</p>
        </div>

        <div id="loginError" class="auth-message error"></div>
        <div id="loginSuccess" class="auth-message success"></div>

        <form id="facultyLoginForm" class="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="faculty@christuniversity.in" required>
                <div id="emailError" class="error-text">Please enter a valid Christ University email address</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                <div id="passwordError" class="error-text">Password is required</div>
            </div>

            <button type="submit" class="btn-login">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10 17l5-5-5-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M15 12H3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Sign In
            </button>
        </form>

        <div class="auth-switch">
            <p class="auth-switch-text">
                Don't have an account? 
                <a class="auth-switch-link" href="faculty-register.html">Create Account</a>
            </p>
        </div>
    </div>

    <script>
        // Email validation for Christ University
        function validateChristUniversityEmail(email) {
            const christEmailRegex = /^[a-zA-Z0-9._%+-]+@(?:[a-zA-Z0-9-]+\.)?christuniversity\.in$/;
            return christEmailRegex.test(email);
        }

        // Show/hide error messages
        function showError(fieldId, show = true, message = '') {
            const field = document.getElementById(fieldId);
            const errorText = document.getElementById(fieldId + 'Error');
            
            if (!field || !errorText) {
                console.warn(`Field or error element not found: ${fieldId}`);
                return;
            }
            
            if (show) {
                field.classList.add('error');
                errorText.classList.add('show');
                if (message) {
                    errorText.textContent = message;
                }
            } else {
                field.classList.remove('error');
                errorText.classList.remove('show');
            }
        }

        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showLoginSuccess(message) {
            const successDiv = document.getElementById('loginSuccess');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            setTimeout(() => successDiv.classList.remove('show'), 5000);
        }

        // Real-time email validation
        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value.trim();
            if (email && !validateChristUniversityEmail(email)) {
                showError('email', true);
            } else {
                showError('email', false);
            }
        });

        // Form submission
        document.getElementById('facultyLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const email = formData.get('email').trim();
            const password = formData.get('password');
            
            // Reset errors
            showError('email', false);
            showError('password', false);
            
            // Validate email
            if (!email) {
                showError('email', true);
                document.getElementById('emailError').textContent = 'Email is required';
                return;
            }
            
            if (!validateChristUniversityEmail(email)) {
                showError('email', true);
                document.getElementById('emailError').textContent = 'Must be a Christ University email address';
                return;
            }
            
            // Validate password
            if (!password) {
                showError('password', true);
                document.getElementById('passwordError').textContent = 'Password is required';
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/faculty/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store authentication data
                    localStorage.setItem('faculty_token', data.access_token);
                    localStorage.setItem('faculty_user', JSON.stringify({
                        email: email,
                        token: data.access_token
                    }));
                    
                    showLoginSuccess('Login successful! Redirecting to dashboard...');
                    
                    // Redirect to faculty dashboard
                    setTimeout(() => {
                        window.location.href = 'faculty-dashboard.html';
                    }, 1500);
                } else {
                    showLoginError(data.detail || 'Login failed');
                }
            } catch (error) {
                showLoginError('Network error. Please try again.');
            }
        });

        // Clear errors on input
        document.getElementById('email').addEventListener('input', function() {
            showError('email', false);
        });
        
        document.getElementById('password').addEventListener('input', function() {
            showError('password', false);
        });
    </script>
</body>
</html>
